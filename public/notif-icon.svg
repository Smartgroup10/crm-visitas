<?xml version="1.0" encoding="UTF-8"?>
<!--
  Icono cuadrado branded para las notificaciones del navegador
  (Notification API). Usa el glyph oficial Smartgroup sobre fondo
  navy (#0e2a59) — mismo navy del logo full y de la pantalla de
  login, así la notificación queda visualmente ligada al CRM
  cuando aparece en la esquina del SO.

  Dimensiones: 192×192 (lo que piden Chrome/Edge/Firefox para el
  área principal del pop-up). El path del glyph viene tal cual del
  SVG de marca oficial; el viewBox `560 380 1320 1320` lo centra
  cuadrado dentro del icono.

  Si el navegador no acepta SVG (Safari macOS ocasionalmente),
  cae al favicon del sitio automáticamente.
-->

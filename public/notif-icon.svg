<?xml version="1.0" encoding="UTF-8"?>
<!--
  Icono cuadrado con la marca SMARTGROUP. Lo consumen las notificaciones
  del navegador (Notification API) como `icon`. 192×192 es el tamaño que
  Chrome/Edge/Firefox piden para el área principal del pop-up.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>
  <rect width="192" height="192" rx="36" fill="url(#g)"/>
  <text x="50%" y="54%" text-anchor="middle" dominant-baseline="middle"
        font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
        font-size="120" font-weight="800" fill="#ffffff" letter-spacing="-4">S</text>
</svg>
